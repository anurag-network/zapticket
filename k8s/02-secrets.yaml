apiVersion: v1
kind: Secret
metadata:
  name: zapticket-secrets
  namespace: zapticket
type: Opaque
stringData:
  # Database - replace with your values
  DATABASE_USER: "zapticket"
  DATABASE_PASSWORD: "CHANGE_ME_POSTGRES_PASSWORD"
  DATABASE_URL: "postgresql://zapticket:CHANGE_ME_POSTGRES_PASSWORD@postgres:5432/zapticket"
  
  # Redis - replace with your values
  REDIS_URL: "redis://redis:6379"
  REDIS_PASSWORD: "CHANGE_ME_REDIS_PASSWORD"
  
  # Meilisearch - replace with your values
  MEILISEARCH_API_KEY: "CHANGE_ME_MEILISEARCH_KEY"
  
  # MinIO - replace with your values
  MINIO_ACCESS_KEY: "zapticket"
  MINIO_SECRET_KEY: "CHANGE_ME_MINIO_PASSWORD"
  
  # JWT - replace with a secure random string
  JWT_SECRET: "CHANGE_ME_JWT_SECRET_MIN_32_CHARS"
  JWT_EXPIRES_IN: "7d"
  
  # Application
  POSTGRES_PASSWORD: "CHANGE_ME_POSTGRES_PASSWORD"
