apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: zapticket
  labels:
    app: api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        tier: backend
    spec:
      containers:
        - name: api
          image: your-registry/zapticket-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: zapticket-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: zapticket-secrets
                  key: REDIS_URL
            - name: MEILISEARCH_HOST
              valueFrom:
                configMapKeyRef:
                  name: zapticket-config
                  key: MEILISEARCH_HOST
            - name: MEILISEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zapticket-secrets
                  key: MEILISEARCH_API_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zapticket-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              valueFrom:
                secretKeyRef:
                  name: zapticket-secrets
                  key: JWT_EXPIRES_IN
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: zapticket-config
                  key: MINIO_ENDPOINT
            - name: MINIO_PORT
              valueFrom:
                configMapKeyRef:
                  name: zapticket-config
                  key: MINIO_PORT
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: zapticket-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: zapticket-secrets
                  key: MINIO_SECRET_KEY
            - name: MINIO_USE_SSL
              valueFrom:
                configMapKeyRef:
                  name: zapticket-config
                  key: MINIO_USE_SSL
            - name: MINIO_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: zapticket-config
                  key: MINIO_BUCKET
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: zapticket
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    app: api
