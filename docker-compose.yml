version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zapticket-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zapticket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zapticket_secret}
      POSTGRES_DB: ${POSTGRES_DB:-zapticket}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zapticket}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zapticket-network

  redis:
    image: redis:7-alpine
    container_name: zapticket-redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zapticket-network

  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: zapticket-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-zapticket_master_key}
      MEILI_ENV: production
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zapticket-network

  minio:
    image: minio/minio:latest
    container_name: zapticket-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-zapticket}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-zapticket_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - zapticket-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: zapticket-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${API_PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-zapticket}:${POSTGRES_PASSWORD:-zapticket_secret}@postgres:5432/${POSTGRES_DB:-zapticket}
      REDIS_URL: redis://redis:6379${REDIS_PASSWORD:+?password=$REDIS_PASSWORD}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_MASTER_KEY:-zapticket_master_key}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-zapticket}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-zapticket_secret}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: zapticket
    ports:
      - "${API_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - zapticket-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: zapticket-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${WEB_PORT:-3000}
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3001}
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - zapticket-network

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:

networks:
  zapticket-network:
    name: zapticket-network
